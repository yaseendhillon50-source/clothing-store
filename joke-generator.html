<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .joke-display {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 5px solid #667eea;
        }

        .joke-text {
            font-size: 1.3rem;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        .joke-punchline {
            font-size: 1.1rem;
            color: #667eea;
            font-weight: 700;
            margin-top: 15px;
        }

        .loading {
            display: none;
            font-size: 1.2rem;
            color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 150px;
        }

        .btn-get-joke {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-get-joke:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-get-joke:active {
            transform: translateY(0);
        }

        .btn-get-joke:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-copy {
            background: #e0e0e0;
            color: #333;
        }

        .btn-copy:hover {
            background: #d0d0d0;
        }

        .joke-type {
            margin: 20px 0;
        }

        .joke-type label {
            font-size: 1rem;
            color: #666;
            margin-right: 15px;
            font-weight: 600;
        }

        select {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            background: white;
            color: #333;
        }

        select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error-message {
            display: none;
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #c33;
        }

        .success-message {
            display: none;
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #3c3;
        }

        @media (max-width: 500px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .joke-text {
                font-size: 1.1rem;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>😂 Joke Generator</h1>
            <p>Get random jokes to brighten your day!</p>
        </div>

        <div class="joke-type">
            <label for="jokeType">Select Joke Type:</label>
            <select id="jokeType">
                <option value="any">Any Type</option>
                <option value="general">General</option>
                <option value="programming">Programming</option>
                <option value="knock-knock">Knock Knock</option>
            </select>
        </div>

        <div class="joke-display" id="jokeDisplay">
            <div class="loading" id="loading">⏳ Loading...</div>
            <div class="joke-text" id="jokeText">Click "Get Joke" to start laughing! 🎉</div>
            <div class="joke-punchline" id="jokeAnswer" style="display: none;"></div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div class="button-group">
            <button class="btn-get-joke" id="getJokeBtn" onclick="fetchJoke()">Get Joke</button>
            <button class="btn-copy" onclick="copyJoke()">📋 Copy Joke</button>
        </div>

        <p style="color: #999; font-size: 0.9rem; margin-top: 30px;">Powered by Official Joke API</p>
    </div>

    <script>
        let currentJoke = {
            setup: '',
            delivery: ''
        };

        // Fetch joke from API
        async function fetchJoke() {
            const jokeType = document.getElementById('jokeType').value;
            const getJokeBtn = document.getElementById('getJokeBtn');
            const loading = document.getElementById('loading');
            const jokeText = document.getElementById('jokeText');
            const jokeAnswer = document.getElementById('jokeAnswer');
            const errorMessage = document.getElementById('errorMessage');

            // Reset messages
            errorMessage.style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            // Disable button and show loading
            getJokeBtn.disabled = true;
            loading.style.display = 'block';
            jokeText.style.display = 'none';
            jokeAnswer.style.display = 'none';

            try {
                // Build API URL based on joke type
                let apiUrl = 'https://official-joke-api.appspot.com/random_joke';
                
                if (jokeType !== 'any') {
                    apiUrl = `https://official-joke-api.appspot.com/jokes/${jokeType}/random`;
                }

                // Fetch the joke
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Handle array response (for specific types)
                const joke = Array.isArray(data) ? data[0] : data;

                // Store joke
                currentJoke = {
                    setup: joke.setup || joke.joke || '',
                    delivery: joke.delivery || ''
                };

                // Display joke
                jokeText.textContent = currentJoke.setup;
                jokeText.style.display = 'block';

                if (currentJoke.delivery) {
                    jokeAnswer.textContent = currentJoke.delivery;
                    jokeAnswer.style.display = 'block';
                }

                loading.style.display = 'none';
                getJokeBtn.disabled = false;

            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = '❌ Oops! Failed to load joke. Please try again!';
                errorMessage.style.display = 'block';
                loading.style.display = 'none';
                jokeText.textContent = 'Something went wrong...';
                jokeText.style.display = 'block';
                getJokeBtn.disabled = false;
            }
        }

        // Copy joke to clipboard
        function copyJoke() {
            const jokeText = currentJoke.setup + (currentJoke.delivery ? '\n' + currentJoke.delivery : '');
            
            if (!jokeText || jokeText === '') {
                alert('No joke to copy! Get a joke first.');
                return;
            }

            navigator.clipboard.writeText(jokeText).then(() => {
                const successMsg = document.getElementById('successMessage');
                successMsg.textContent = '✅ Joke copied to clipboard!';
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            }).catch(() => {
                alert('Failed to copy. Please try manually.');
            });
        }

        // Load initial joke on page load
        window.addEventListener('load', () => {
            fetchJoke();
        });

        // Fetch new joke when joke type changes
        document.getElementById('jokeType').addEventListener('change', () => {
            fetchJoke();
        });

        // Allow Enter key to fetch joke
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchJoke();
            }
        });
    </script>
</body>
</html>
